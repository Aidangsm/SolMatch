<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a3c"/>
      <stop offset="100%" style="stop-color:#e85d00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="60" fill="url(#bg)"/>

  <!-- Sun rays -->
  <g transform="translate(200, 200)" stroke="white" stroke-width="14" stroke-linecap="round">
    <line x1="0" y1="-110" x2="0" y2="-135"/>
    <line x1="0" y1="110" x2="0" y2="135"/>
    <line x1="-110" y1="0" x2="-135" y2="0"/>
    <line x1="110" y1="0" x2="135" y2="0"/>
    <line x1="-78" y1="-78" x2="-95" y2="-95"/>
    <line x1="78" y1="-78" x2="95" y2="-95"/>
    <line x1="-78" y1="78" x2="-95" y2="95"/>
    <line x1="78" y1="78" x2="95" y2="95"/>
  </g>

  <!-- Sun circle -->
  <circle cx="200" cy="200" r="75" fill="white" opacity="0.95"/>

  <!-- Solar panel grid inside sun -->
  <g transform="translate(200,200)" stroke="#ff7c0a" stroke-width="3.5" opacity="0.55">
    <line x1="-38" y1="-24" x2="38" y2="-24"/>
    <line x1="-38" y1="0" x2="38" y2="0"/>
    <line x1="-38" y1="24" x2="38" y2="24"/>
    <line x1="-19" y1="-38" x2="-19" y2="38"/>
    <line x1="0" y1="-38" x2="0" y2="38"/>
    <line x1="19" y1="-38" x2="19" y2="38"/>
  </g>
</svg>
